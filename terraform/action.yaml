name: 'Terraform container actions'
description: 'Terraform action for demos'
author: 'IsaacJFox'
inputs:
  ARM_CLIENT_ID: 
    description: 'Azure client ID'
    required: true
  ARM_CLIENT_SECRET:
    description: 'Azure client secret'
    required: true
  ARM_SUBSCRIPTION_ID:
    description: 'Azure subscription ID'
    required: true
  ARM_TENANT_ID: 
    description: 'Azure tenant ID'
    required: true
  STATE_KEY: 
    description: 'Unique value to identify your state slice'
    required: true
  TF_STAGE:
    description: 'The stage for deployment'
    required: true
  DJANGO_SECRET_KEY_PROD: 
    description: 'The secret key for django to start'
    required: false
runs:
  using: 'docker'
  image: 'Dockerfile'
